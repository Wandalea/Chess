<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess</title>
    <link rel="stylesheet" href="chess.css">
    <script src="chess.js"></script>
</head>
<body>
    <div class="title">
        <h1>Basic Chess</h1>
    </div>

    <div class="btn">
        <a href="home.html">Home</a>
    </div>

    <div class="btn">
        <button id="resetBtn">Reset</button>
    </div>

    <div class="btn">
        <button id="forfeitBtn">Forfeit</button>
    </div>

    <div class="timers">
        <span id="p1-timer">00:00</span> <button id="p1-toggle">Pause</button>
        <span id="p2-timer">00:00</span> <button id="p2-toggle">Pause</button>
    </div>
    
    <div class="board">
        <table id="chessTable2">
            <tr class="border legend">
                <th id="0"></th>
                <th id="1">1</th>
                <th id="2">2</th>
                <th id="3">3</th>
                <th id="4">4</th>
                <th id="5">5</th>
                <th id="6">6</th>
                <th id="7">7</th>
                <th id="8">8</th>
            </tr>
            <tr>
                <th class="border legend" id="A0">A</th>
                <td class="chess-square light"  id="A1">♜</td>
                <td class="chess-square dark"   id="A2">♞</td>
                <td class="chess-square light"  id="A3">♝</td>
                <td class="chess-square dark"   id="A4">♛</td>
                <td class="chess-square light"  id="A5">♚</td>
                <td class="chess-square dark"   id="A6">♝</td>
                <td class="chess-square light"  id="A7">♞</td>
                <td class="chess-square dark"   id="A8">♜</td>
            </tr>
            <tr>
                <th class="border legend" id="B0">B</th>
                <td class="chess-square dark"   id="B1">♟</td>
                <td class="chess-square light"  id="B2">♟</td>
                <td class="chess-square dark"   id="B3">♟</td>
                <td class="chess-square light"  id="B4">♟</td>
                <td class="chess-square dark"   id="B5">♟</td>
                <td class="chess-square light"  id="B6">♟</td>
                <td class="chess-square dark"   id="B7">♟</td>
                <td class="chess-square light"  id="B8">♟</td>
            </tr>
            <tr>
                <th class="border legend" id="C0">C</th>
                <td class="chess-square light"  id="C1"></td>
                <td class="chess-square dark"   id="C2"></td>
                <td class="chess-square light"  id="C3"></td>
                <td class="chess-square dark"   id="C4"></td>
                <td class="chess-square light"  id="C5"></td>
                <td class="chess-square dark"   id="C6"></td>
                <td class="chess-square light"  id="C7"></td>
                <td class="chess-square dark"   id="C8"></td>
            </tr>
            <tr>
                <th class="border legend" id="D0">D</th>
                <td class="chess-square dark"   id="D1"></td>
                <td class="chess-square light"  id="D2"></td>
                <td class="chess-square dark"   id="D3"></td>
                <td class="chess-square light"  id="D4"></td>
                <td class="chess-square dark"   id="D5"></td>
                <td class="chess-square light"  id="D6"></td>
                <td class="chess-square dark"   id="D7"></td>
                <td class="chess-square light"  id="D8"></td>
            </tr>
            <tr>
                <th class="border legend" id="E0">E</th>
                <td class="chess-square light"  id="E1"></td>
                <td class="chess-square dark"   id="E2"></td>
                <td class="chess-square light"  id="E3"></td>
                <td class="chess-square dark"   id="E4"></td>
                <td class="chess-square light"  id="E5"></td>
                <td class="chess-square dark"   id="E6"></td>
                <td class="chess-square light"  id="E7"></td>
                <td class="chess-square dark"   id="E8"></td>
            </tr>
            <tr>
                <th class="border legend" id="F0">F</th>
                <td class="chess-square dark"   id="F1"></td>
                <td class="chess-square light"  id="F2"></td>
                <td class="chess-square dark"   id="F3"></td>
                <td class="chess-square light"  id="F4"></td>
                <td class="chess-square dark"   id="F5"></td>
                <td class="chess-square light"  id="F6"></td>
                <td class="chess-square dark"   id="F7"></td>
                <td class="chess-square light"  id="F8"></td>
            </tr>
            <tr>
                <th class="border legend" id="G0">G</th>
                <td class="chess-square light"  id="G1">♙</td>
                <td class="chess-square dark"   id="G2">♙</td>
                <td class="chess-square light"  id="G3">♙</td>
                <td class="chess-square dark"   id="G4">♙</td>
                <td class="chess-square light"  id="G5">♙</td>
                <td class="chess-square dark"   id="G6">♙</td>
                <td class="chess-square light"  id="G7">♙</td>
                <td class="chess-square dark"   id="G8">♙</td>
            </tr>
            <tr>
                <th class="border legend" id="H0">H</th>
                <td class="chess-square dark"   id="H1">♖</td>
                <td class="chess-square light"  id="H2">♘</td>
                <td class="chess-square dark"   id="H3">♗</td>
                <td class="chess-square light"  id="H4">♕</td>
                <td class="chess-square dark"   id="H5">♔</td>
                <td class="chess-square light"  id="H6">♗</td>
                <td class="chess-square dark"   id="H7">♘</td>
                <td class="chess-square light"  id="H8">♖</td>
            </tr>
        </table>
    </div>

    <div id="gameOver" class="game-over hidden">
        <h2 id="gameOverText"></h2>
        <div class="greenBtn">
            <button id="playAgainBtn">Play Again</button>
        </div>
        <div class="greenBtn">
            <button id= "homeBtn">Home</button>
        </div>
    </div>

</body>
</html>
<!-- 
Name of the Piece	Unicode Representation	 U+ Code
King	            ♔, ♚	                U+2654, U+265A
Queen	            ♕, ♛	                U+2655, U+265B
Rook	            ♖, ♜	                U+2656, U+265C
Bishop	            ♗, ♝	                U+2657, U+265D
Knight	            ♘, ♞	                U+2658, U+265E
Pawn	            ♙, ♟	                U+2659, U+265F 
-->
